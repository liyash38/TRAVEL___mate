
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Mate - Google Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;padding-bottom:50px}
nav{background:#020617;padding:15px;display:flex;justify-content:space-between}
button{padding:10px 16px;border:none;border-radius:6px;background:#facc15;font-weight:bold;cursor:pointer;margin-top:10px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin:20px 0}
.hidden{display:none}
footer{text-align:center;padding:20px;background:#020617;margin-top:40px}
.star{cursor:pointer;font-size:22px;color:gray}
.star.active{color:gold}
.carousel{position:relative;overflow:hidden;border-radius:8px}
.carousel img{width:100%;height:220px;object-fit:cover;display:none}
.carousel img.active{display:block}
.review-box{background:#0f172a;padding:10px;border-radius:6px;margin-top:10px}
.google-btn{background:#4285F4;color:white}
</style>
</head>

<body>

<nav>
<div><b>Travel Mate</b></div>
<div id="navRight"></div>
</nav>

<div id="authSection" style="padding:20px;">
<h2>Login</h2>
<button class="google-btn" onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="main" class="hidden" style="padding:20px;">
<h2>Packages</h2>
<div id="packages"></div>
</div>

<footer>
© 2026 Travel Mate <br>
travelmate@gmail.com
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBe9PPyqfs9Th7AGumhvT0u0fBW2e7__K8",
  authDomain: "travelmate-7c433.firebaseapp.com",
  projectId: "travelmate-7c433",
  storageBucket: "travelmate-7c433.firebasestorage.app",
  messagingSenderId: "452266842172",
  appId: "1:452266842172:web:a93a82e3d3c3b87447cb39"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .catch(error=>alert(error.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
    document.getElementById("navRight").innerHTML=user.displayName+" | <button onclick='logout()'>Logout</button>";
    loadPackages();
  }
});

function logout(){
  auth.signOut();
  location.reload();
}

const packageData=[
{
name:"Maldives Escape",
price:75000,
images:[
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
"https://images.unsplash.com/photo-1470115636492-6d2b56f9146d"
]
},
{
name:"Paris Delight",
price:82000,
images:[
"https://images.unsplash.com/photo-1502602898657-3e91760cbb34",
"https://images.unsplash.com/photo-1499856871958-5b9627545d1a",
"https://images.unsplash.com/photo-1522092787789-3a4a6d4e8d47"
]
}
];

function loadPackages(){
let html="";
packageData.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<div class="carousel" id="carousel-${p.name}">
${p.images.map((img,i)=>`<img src="${img}" class="${i===0?'active':''}">`).join("")}
</div>
<p>₹${p.price}</p>
<div id="stars-${p.name}"></div>
<div id="avg-${p.name}"></div>
<textarea id="comment-${p.name}" placeholder="Write review"></textarea>
<button onclick="submitReview('${p.name}')">Submit Review</button>
<div id="reviews-${p.name}"></div>
</div>`;
});
document.getElementById("packages").innerHTML=html;

packageData.forEach(p=>{
initCarousel(p.name);
initStars(p.name);
loadReviews(p.name);
});
}

function initCarousel(name){
let index=0;
const images=document.querySelectorAll(`#carousel-${name} img`);
setInterval(()=>{
images[index].classList.remove("active");
index=(index+1)%images.length;
images[index].classList.add("active");
},3000);
}

function initStars(name){
let container=document.getElementById("stars-"+name);
for(let i=1;i<=5;i++){
let span=document.createElement("span");
span.innerHTML="★";
span.className="star";
span.onclick=()=>highlightStars(name,i);
container.appendChild(span);
}
}

function highlightStars(name,count){
let stars=document.querySelectorAll(`#stars-${name} .star`);
stars.forEach((s,i)=>{
s.classList.toggle("active",i<count);
});
stars.forEach(s=>s.dataset.rating=count);
}

function submitReview(name){
let stars=document.querySelectorAll(`#stars-${name} .star`);
let rating=stars[0].dataset.rating;
let comment=document.getElementById("comment-"+name).value;
if(!rating){alert("Select rating");return;}
db.collection("reviews").add({
package:name,
rating:parseInt(rating),
comment:comment,
user:auth.currentUser.email
}).then(()=>{
document.getElementById("comment-"+name).value="";
loadReviews(name);
});
}

function loadReviews(name){
db.collection("reviews").where("package","==",name)
.onSnapshot(snap=>{
let total=0,count=0,html="";
snap.forEach(doc=>{
let r=doc.data();
total+=r.rating;
count++;
html+=`<div class="review-box">
<b>${r.user}</b> ⭐${r.rating}
<p>${r.comment}</p>
</div>`;
});
let avg=count?(total/count).toFixed(1):0;
document.getElementById("avg-"+name).innerHTML="Average Rating: ⭐ "+avg;
document.getElementById("reviews-"+name).innerHTML=html;
});
}
</script>

</body>
</html>
