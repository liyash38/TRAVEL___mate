<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAVEL MATE | Explore. Dream. Discover</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:sans-serif;background:#020617;color:#f8fafc}
.glass-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)}
.modal-hidden{display:none!important}
.btn-premium{background:linear-gradient(90deg,#3b82f6,#2dd4bf)}
.admin-only{display:none}
</style>
</head>
<body>

<nav class="p-4 flex justify-between bg-black/40">
<h1 class="font-bold text-xl">TRAVEL MATE</h1>
<div>
<button onclick="showAdmin()" class="admin-only text-emerald-400 mr-4">Admin</button>
<button id="login-btn">Login</button>
<button id="logout-btn" class="hidden">Logout</button>
</div>
</nav>

<div id="user-view" class="p-10">
<div id="package-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
</div>

<div id="admin-view" class="hidden p-10">
<h2 class="text-2xl mb-6">CONTROL TOWER</h2>

<button onclick="openAddPackageModal()" class="btn-premium px-4 py-2 mb-6">
Add Package
</button>

<button onclick="hideAdmin()">Back</button>
</div>

<!-- Add Package Modal -->
<div id="add-package-modal" class="modal-hidden fixed inset-0 flex items-center justify-center bg-black/80">
<div class="glass-card p-6 w-80">
<h3 class="mb-4 font-bold">Add Package</h3>

<input id="pkg-name" placeholder="Package Name" class="w-full mb-3 p-2 text-black">
<input id="pkg-price" placeholder="Price" class="w-full mb-3 p-2 text-black">
<input id="pkg-img" placeholder="Image URL" class="w-full mb-4 p-2 text-black">

<button onclick="addNewPackage()" class="btn-premium w-full py-2 mb-2">Add</button>
<button onclick="closeAddPackageModal()" class="w-full py-2 bg-gray-500">Cancel</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBe9PPyqfs9Th7AGumhvT0u0fBW2e7__K8",
authDomain: "travelmate-7c433.firebaseapp.com",
projectId: "travelmate-7c433",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const defaultPackages = [
{name:"Midnight Paris",price:"$1,200",img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400"},
{name:"Zen Bali",price:"$850",img:"https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400"},
{name:"Cyber Tokyo",price:"$1,500",img:"https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400"}
];

async function loadPackages(){
const snap = await getDocs(collection(db,"packages"));
let packages=[];
snap.forEach(doc=>packages.push(doc.data()));

if(packages.length===0){
for(let p of defaultPackages){
await addDoc(collection(db,"packages"),p);
}
return loadPackages();
}

render(packages);
}

function render(packages){
document.getElementById("package-grid").innerHTML =
packages.map(p=>`
<div class="glass-card p-4">
<img src="${p.img}" class="h-40 w-full object-cover mb-3">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
`).join("");
}

window.openAddPackageModal=()=>{
if(auth.currentUser?.email!=="admin@travelmate.com"){
alert("Admin only");return;
}
document.getElementById("add-package-modal").classList.remove("modal-hidden");
};

window.closeAddPackageModal=()=>{
document.getElementById("add-package-modal").classList.add("modal-hidden");
};

window.addNewPackage=async()=>{
if(auth.currentUser?.email!=="admin@travelmate.com"){
alert("Admin only");return;
}
const name=document.getElementById("pkg-name").value;
const price=document.getElementById("pkg-price").value;
const img=document.getElementById("pkg-img").value;

if(!name||!price||!img){alert("Fill all");return;}

await addDoc(collection(db,"packages"),{name,price,img});

closeAddPackageModal();
loadPackages();
};

document.getElementById("login-btn").onclick=async()=>{
const email=prompt("Enter email");
await sendSignInLinkToEmail(auth,email,{
url:window.location.href,
handleCodeInApp:true
});
localStorage.setItem("emailForSignIn",email);
alert("Check your mail");
};

if(isSignInWithEmailLink(auth,window.location.href)){
let email=localStorage.getItem("emailForSignIn");
await signInWithEmailLink(auth,email,window.location.href);
localStorage.removeItem("emailForSignIn");
alert("Login success");
}

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("login-btn").classList.add("hidden");
document.getElementById("logout-btn").classList.remove("hidden");
if(user.email==="admin@travelmate.com"){
document.querySelectorAll(".admin-only").forEach(el=>el.style.display="inline-block");
}
}else{
document.getElementById("login-btn").classList.remove("hidden");
document.getElementById("logout-btn").classList.add("hidden");
}
});

document.getElementById("logout-btn").onclick=()=>signOut(auth);

window.showAdmin=()=>{
document.getElementById("user-view").classList.add("hidden");
document.getElementById("admin-view").classList.remove("hidden");
};
window.hideAdmin=()=>{
document.getElementById("user-view").classList.remove("hidden");
document.getElementById("admin-view").classList.add("hidden");
};

loadPackages();
</script>

</body>
</html>
