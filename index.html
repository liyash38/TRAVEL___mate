<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAVEL MATE | Explore. Dream. Discover</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
body{font-family:'Plus Jakarta Sans',sans-serif;background:#020617;color:#f8fafc;min-height:100vh;overflow-x:hidden}
.glass-card{background:rgba(255,255,255,0.03);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);transition:.4s}
.glass-card:hover{border-color:rgba(59,130,246,.5);transform:translateY(-5px)}
.modal-hidden{display:none!important}
.admin-only{display:none}
#login-modal,.unique-popup{z-index:9999}
.btn-premium{background:linear-gradient(90deg,#3b82f6,#2dd4bf);transition:.3s;cursor:pointer}
.hero-bg{position:absolute;top:0;left:0;width:100%;height:700px;z-index:-1;overflow:hidden}
.hero-slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1s ease-in-out;transform:scale(1.1)}
.hero-slide.active{opacity:.4;animation:zoomIn 6s infinite alternate}
@keyframes zoomIn{from{transform:scale(1)}to{transform:scale(1.15)}}
.unique-popup-content{animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<div class="hero-bg">
<div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1600')"></div>
<div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1506929662133-5702933635fb?w=1600')"></div>
<div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600')"></div>
</div>

<nav class="fixed w-full z-[100] bg-black/50 backdrop-blur-md px-8 py-4 flex justify-between items-center border-b border-white/5">
<div class="flex items-center space-x-3">
<img src="001 (1).png" class="h-10 w-10 object-contain">
<h1 class="text-2xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">TRAVEL MATE</h1>
</div>
<div class="flex items-center space-x-6 text-[10px] font-bold tracking-widest uppercase">
<button onclick="showAdmin()" class="admin-only text-emerald-400 border border-emerald-400/20 px-3 py-1 rounded">Admin</button>
<span id="user-display" class="text-blue-300 hidden"></span>
<button id="login-btn" onclick="document.getElementById('login-modal').classList.remove('modal-hidden')" class="btn-premium px-6 py-2 rounded-full text-white">Login</button>
<button id="logout-btn" class="hidden text-red-400 border border-red-400/20 px-6 py-2 rounded-full">Logout</button>
</div>
</nav>

<header id="hero" class="pt-52 pb-40 text-center relative">
<h2 class="text-6xl md:text-8xl font-extrabold mb-4 tracking-tight leading-none drop-shadow-2xl">Explore. <br><span class="text-blue-500">Dream.</span> Discover</h2>
<p class="text-blue-200/50 uppercase tracking-[0.4em] text-sm">Boutique Luxury Travel</p>
</header>

<main id="user-view" class="max-w-7xl mx-auto px-6">
<div id="package-grid" class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-20"></div>
<section id="dashboard" class="hidden glass-card rounded-[40px] p-10 mb-20">
<h3 class="text-2xl font-bold mb-8">My Itineraries</h3>
<table class="w-full text-left"><tbody id="history-body" class="divide-y divide-white/5"></tbody></table>
</section>
<section id="write-review" class="hidden glass-card rounded-[40px] p-10 mb-20 max-w-2xl mx-auto border-emerald-500/20">
<h3 class="text-xl font-bold mb-4 text-center">Share Your Experience</h3>
<textarea id="review-text" placeholder="How was your trip?" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-4 text-white outline-none focus:border-blue-500 h-32"></textarea>
<button onclick="window.submitReview()" class="w-full btn-premium py-4 rounded-2xl font-bold text-white uppercase tracking-widest text-xs">Post Journal Entry</button>
</section>
<section id="reviews" class="py-20 border-t border-white/5">
<h3 class="text-3xl font-bold mb-12 text-center">Voyager Journal</h3>
<div id="review-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</section>
</main>

<footer class="border-t border-white/5 bg-black/20 backdrop-blur-lg py-12 mt-20">
<div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
<div class="flex items-center space-x-3 opacity-70">
<img src="001 (1).png" class="h-6 w-6">
<span class="text-xs font-bold tracking-[0.3em] uppercase">Travel Mate</span>
</div>
<div class="text-center">
<p class="text-blue-400 font-bold text-sm tracking-widest">Travelmate@gmail.com</p>
<p class="text-[10px] text-gray-500 uppercase mt-2">© 2026 Travel Mate Boutique. All Rights Reserved.</p>
</div>
<div class="flex space-x-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">
<a href="#" class="hover:text-white transition">Privacy</a>
<a href="#" class="hover:text-white transition">Terms</a>
</div>
</div>
</footer>

<!-- ADD PACKAGE MODAL -->
<div id="add-package-modal" class="modal-hidden fixed inset-0 flex items-center justify-center bg-black/90 backdrop-blur-xl">
<div class="glass-card p-12 rounded-[48px] max-w-md w-full text-center">
<h2 class="text-2xl font-bold mb-6">Add New Package</h2>
<input type="text" id="new-name" placeholder="Package Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-white outline-none">
<input type="text" id="new-price" placeholder="Price (ex: $1200)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-white outline-none">
<input type="text" id="new-img" placeholder="Image URL" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 text-white outline-none">
<button onclick="addPackage()" class="w-full btn-premium py-3 rounded-xl font-bold uppercase text-xs">Add Package</button>
<button onclick="closeAddPackageModal()" class="w-full mt-4 text-gray-500 text-[10px] uppercase">Cancel</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={apiKey:"AIzaSyBe9PPyqfs9Th7AGumhvT0u0fBW2e7__K8",authDomain:"travelmate-7c433.firebaseapp.com",projectId:"travelmate-7c433",storageBucket:"travelmate-7c433.firebasestorage.app",messagingSenderId:"452266842172",appId:"1:452266842172:web:a93a82e3d3c3b87447cb39"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

/* --- ORIGINAL PACKAGES UNTOUCHED --- */
let packages=[
{ id:1,name:"Midnight Paris",price:"$1,200",img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=400"},
{ id:2,name:"Zen Bali",price:"$850",img:"https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400"},
{ id:3,name:"Cyber Tokyo",price:"$1,500",img:"https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=400"},
{ id:4,name:"Azure Greece",price:"$1,100",img:"https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=400"},
{ id:5,name:"Swiss Alps",price:"$2,100",img:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400"},
{ id:6,name:"Safari Kenya",price:"$1,800",img:"https://images.unsplash.com/photo-1516426122078-c23e76319801?w=400"},
{ id:7,name:"NYC Skyline",price:"$950",img:"https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400"},
{ id:8,name:"Cairo Pyramids",price:"$780",img:"https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?w=400"},
{ id:9,name:"Iceland Aurora",price:"$2,400",img:"https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=400"},
{ id:10,name:"London Mist",price:"$1,350",img:"https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=400"},
{ id:11,name:"Venice Canals",price:"$1,600",img:"https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=400"},
{ id:12,name:"Dubai Desert",price:"$1,900",img:"https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=400"},
{ id:13,name:"Morocco Souks",price:"$1,150",img:"https://images.unsplash.com/photo-1539020140153-e479b8c22e70?w=400"},
{ id:14,name:"Sydney Opera",price:"$2,000",img:"https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=400"},
{ id:15,name:"Rio Carnival",price:"$1,750",img:"https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=400"}
];

/* --- ADD PACKAGE LOGIC ONLY --- */
window.openAddPackageModal=()=>{
if(auth.currentUser?.email!=="admin@travelmate.com"){alert("Admin only");return;}
document.getElementById("add-package-modal").classList.remove("modal-hidden");
};
window.closeAddPackageModal=()=>document.getElementById("add-package-modal").classList.add("modal-hidden");
window.addPackage=()=>{
if(auth.currentUser?.email!=="admin@travelmate.com"){alert("Admin only");return;}
const name=document.getElementById("new-name").value;
const price=document.getElementById("new-price").value;
const img=document.getElementById("new-img").value;
if(!name||!price||!img){alert("Fill all");return;}
packages.push({id:Date.now(),name,price,img});
document.getElementById("new-name").value="";
document.getElementById("new-price").value="";
document.getElementById("new-img").value="";
closeAddPackageModal();
render();
};

/* --- ORIGINAL FUNCTIONS CONTINUE --- */
function render(){
document.getElementById('package-grid').innerHTML=packages.map(p=>`
<div class="glass-card rounded-[32px] overflow-hidden group cursor-pointer" onclick="window.bookPackage('${p.name}')">
<img src="${p.img}" class="h-48 w-full object-cover">
<div class="p-6">
<h4 class="font-bold uppercase tracking-widest text-xs">${p.name}</h4>
<p class="text-blue-400 text-[10px] font-bold mt-2">${p.price} / Total</p>
</div>
</div>`).join('');
}
render();
</script>
</body>
</html>
