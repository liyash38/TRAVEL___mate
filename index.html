<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Travel Mate</title>
  <style>
    /* Basic styling for layout and readability */
    body { font-family: Arial, sans-serif; margin: 0; }
    header { background: #3498db; color: white; padding: 1em; text-align: center; }
    nav { background: #2980b9; padding: 0.5em; text-align: center; }
    nav button { background: #3498db; color: white; border: none; padding: 0.5em 1em; margin: 0 0.25em; cursor: pointer; }
    nav button.active { background: #1abc9c; }
    #message { padding: 0.5em; color: #000; }
    section { display: none; padding: 1em; }
    section.active { display: block; }
    .package { border: 1px solid #ccc; padding: 1em; margin: 1em 0; }
    .package img { max-width: 100%; height: auto; }
    input, textarea { width: 100%; padding: 0.5em; margin: 0.5em 0; }
    button { padding: 0.5em 1em; }
    .notice { background: #ffeb3b; padding: 0.5em; text-align: center; font-weight: bold; }
  </style>
  <!-- Firebase JS SDK (v8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    // Initialize Firebase
    var firebaseConfig = {
      // TODO: Replace with your Firebase config
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      // ... other config fields ...
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();

    window.onload = function() {
      // Show a notice about adding the domain to Firebase Auth
      document.getElementById('authNotice').innerText =
        'Note: Ensure domain ' + window.location.origin +
        ' is added to Firebase Auth Authorized Domains.';
      // Navigation button handling
      document.querySelectorAll('nav button').forEach(btn => {
        btn.onclick = function() {
          document.querySelector('nav button.active')?.classList.remove('active');
          btn.classList.add('active');
          document.querySelector('section.active')?.classList.remove('active');
          document.getElementById(btn.dataset.section).classList.add('active');
        };
      });
      // Default view: Packages
      document.querySelector('nav button[data-section="packages"]').click();
      // Check for sign-in via email link (passwordless login)
      if (auth.isSignInWithEmailLink(window.location.href)) {
        let email = window.localStorage.getItem('emailForSignIn');
        if (!email) {
          email = window.prompt('Please provide your email for confirmation');
        }
        auth.signInWithEmailLink(email, window.location.href)
          .then((result) => {
            showMessage('Logged in as ' + result.user.email);
            window.localStorage.removeItem('emailForSignIn');
            updateUIForUser(result.user);
          })
          .catch((error) => {
            showMessage('Error during sign-in: ' + error.message);
          });
      }
    };

    // Update UI on auth state change
    auth.onAuthStateChanged(user => {
      updateUIForUser(user);
    });
    function updateUIForUser(user) {
      if (user) {
        // Hide login, show profile info
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('userProfile').style.display = 'block';
        document.getElementById('userEmail').innerText = user.email;
        loadBookings();
        loadReviews();
      } else {
        // Show login, clear bookings list
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('userProfile').style.display = 'none';
        document.getElementById('bookingsList').innerHTML = 'Please log in to see bookings.';
      }
    }

    // Send Firebase email sign-in link
    function sendLoginLink() {
      var email = document.getElementById('email').value;
      if (!email) { showMessage('Enter a valid email.'); return; }
      var actionCodeSettings = {
        url: window.location.href,
        handleCodeInApp: true
      };
      auth.sendSignInLinkToEmail(email, actionCodeSettings)
        .then(() => {
          window.localStorage.setItem('emailForSignIn', email);
          showMessage('Sign-in link sent! Check your email.');
        })
        .catch(err => {
          showMessage('Error sending email: ' + err.message);
        });
    }
    function signOut() {
      auth.signOut().then(() => showMessage('Signed out.'));
    }

    // Book a package (Firestore or local fallback)
    function bookPackage(pkgName) {
      var user = auth.currentUser;
      if (!user) { showMessage('Please log in to book.'); return; }
      var booking = {
        user: user.uid,
        package: pkgName,
        date: new Date().toLocaleString()
      };
      db.collection('bookings').add(booking)
        .then(() => {
          showMessage('Booking confirmed for ' + pkgName + '!');
          loadBookings();
        })
        .catch(error => {
          showMessage('Unable to save booking, saving locally.');
          saveLocalBooking(booking);
          loadBookings();
        });
    }
    function loadBookings() {
      var user = auth.currentUser;
      if (!user) return;
      db.collection('bookings').where('user', '==', user.uid).get()
        .then(querySnapshot => {
          var html = '';
          querySnapshot.forEach(doc => {
            var data = doc.data();
            html += '<li>' + data.package + ' on ' + data.date + '</li>';
          });
          // Add any local offline bookings
          var local = JSON.parse(localStorage.getItem('local_bookings')||'[]');
          local.filter(b => b.user === user.uid)
               .forEach(b => html += '<li>' + b.package + ' on ' + b.date + ' (offline)</li>');
          document.getElementById('bookingsList').innerHTML = html || 'No bookings found.';
        })
        .catch(error => {
          // On error, show only local bookings
          var html = '';
          var local = JSON.parse(localStorage.getItem('local_bookings')||'[]');
          local.filter(b => b.user === user.uid)
               .forEach(b => html += '<li>' + b.package + ' on ' + b.date + ' (offline)</li>');
          document.getElementById('bookingsList').innerHTML = html || 'No bookings found (offline).';
        });
    }
    function saveLocalBooking(booking) {
      var local = JSON.parse(localStorage.getItem('local_bookings')||'[]');
      local.push(booking);
      localStorage.setItem('local_bookings', JSON.stringify(local));
    }

    // Submit a review (Firestore or local fallback)
    function submitReview() {
      var user = auth.currentUser;
      if (!user) { showMessage('Please log in to review.'); return; }
      var comment = document.getElementById('reviewText').value;
      if (!comment) { showMessage('Enter a review.'); return; }
      var review = {
        user: user.uid,
        comment: comment,
        date: new Date().toLocaleString()
      };
      db.collection('reviews').add(review)
        .then(() => {
          showMessage('Review submitted!');
          document.getElementById('reviewText').value = '';
          loadReviews();
        })
        .catch(error => {
          showMessage('Unable to save review, saving locally.');
          saveLocalReview(review);
          loadReviews();
        });
    }
    function loadReviews() {
      db.collection('reviews').orderBy('date', 'desc').get()
        .then(snapshot => {
          var html = '';
          snapshot.forEach(doc => {
            var data = doc.data();
            html += '<li><strong>' + (data.user === auth.currentUser?.uid ? 'You' : 'Guest') +
                    ':</strong> ' + data.comment + ' <em>(' + data.date + ')</em></li>';
          });
          var local = JSON.parse(localStorage.getItem('local_reviews')||'[]');
          local.forEach(r => {
            html += '<li><strong>You (offline):</strong> ' + r.comment + ' <em>(' + r.date + ')</em></li>';
          });
          document.getElementById('reviewsList').innerHTML = html || 'No reviews yet.';
        })
        .catch(error => {
          // Show offline reviews only
          var html = '';
          var local = JSON.parse(localStorage.getItem('local_reviews')||'[]');
          local.forEach(r => {
            html += '<li><strong>You (offline):</strong> ' + r.comment + ' <em>(' + r.date + ')</em></li>';
          });
          document.getElementById('reviewsList').innerHTML = html || 'No reviews found (offline).';
        });
    }
    function saveLocalReview(review) {
      var local = JSON.parse(localStorage.getItem('local_reviews')||'[]');
      local.push(review);
      localStorage.setItem('local_reviews', JSON.stringify(local));
    }

    // Utility to show a message temporarily
    function showMessage(msg) {
      var el = document.getElementById('message');
      el.innerText = msg;
      setTimeout(() => { el.innerText = ''; }, 4000);
    }
  </script>
</head>
<body>
  <header>
    <h1>Travel Mate</h1>
    <div class="notice" id="authNotice"></div>
    <div id="message"></div>
  </header>
  <nav>
    <button data-section="packages" class="active">Packages</button>
    <button data-section="bookings">My Bookings</button>
    <button data-section="reviews">Reviews</button>
    <button data-section="profileSection">Profile</button>
  </nav>
  <section id="packages" class="active">
    <h2>Packages</h2>
    <div class="package">
      <h3>Beautiful Bali</h3>
      <img src="https://source.unsplash.com/featured/?Bali" alt="Bali Beach">
      <p>Experience the serene beaches of Bali.</p>
      <button onclick="bookPackage('Beautiful Bali')">Book Now</button>
    </div>
    <div class="package">
      <h3>Stunning Switzerland</h3>
      <img src="https://source.unsplash.com/featured/?Switzerland" alt="Swiss Alps">
      <p>Explore the majestic Alps of Switzerland.</p>
      <button onclick="bookPackage('Stunning Switzerland')">Book Now</button>
    </div>
  </section>
  <section id="bookings">
    <h2>My Bookings</h2>
    <ul id="bookingsList">Please log in to see bookings.</ul>
  </section>
  <section id="reviews">
    <h2>Reviews</h2>
    <textarea id="reviewText" placeholder="Write your review here"></textarea>
    <button onclick="submitReview()">Submit Review</button>
    <ul id="reviewsList"></ul>
  </section>
  <section id="profileSection">
    <h2>Profile</h2>
    <div id="loginForm">
      <p>Enter your email to receive a login link:</p>
      <input type="email" id="email" placeholder="Your email">
      <button onclick="sendLoginLink()">Send Login Link</button>
    </div>
    <div id="userProfile" style="display:none;">
      <p>Welcome, <span id="userEmail"></span></p>
      <button onclick="signOut()">Sign Out</button>
    </div>
  </section>
</body>
</html>
